<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="540" height="540">

  <!-- Background -->
  <rect width="108" height="108" fill="#000000"/>

  <!-- Bolha 2 — azul LCARS (desenhada primeiro, fica atrás) -->
  <rect x="30" y="48" width="70" height="48" rx="14" fill="#6688CC"/>

  <!-- Bolha 1 — laranja LCARS (principal, frente) -->
  <rect x="8" y="8" width="70" height="48" rx="14" fill="#FF7700"/>

  <!-- Linhas de conteúdo dentro da bolha laranja -->
  <rect x="20" y="20" width="46" height="6" rx="3" fill="#000000" opacity="0.3"/>
  <rect x="20" y="30" width="34" height="6" rx="3" fill="#000000" opacity="0.3"/>
  <rect x="20" y="40" width="40" height="6" rx="3" fill="#000000" opacity="0.3"/>

  <!-- Linhas de conteúdo dentro da bolha azul -->
  <rect x="42" y="60" width="46" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
  <rect x="42" y="72" width="32" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
  <rect x="42" y="84" width="38" height="6" rx="3" fill="#ffffff" opacity="0.35"/>

</svg>
